<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProgressCard Studio — Build Beautiful Progress Cards</title>
  <meta name="description" content="Create stunning, customizable progress cards for LinkedIn, GitHub, and social media. No sign-up, no frameworks — just open and create." />
  <meta property="og:title" content="ProgressCard Studio" />
  <meta property="og:description" content="Create beautiful progress cards to showcase your journey. Free, open-source, and runs entirely in your browser." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  
  <!-- ══════════ EDITOR SIDEBAR ══════════ -->
  <div class="editor-sidebar">
    <div class="editor-header">
      <div>
        <h1 class="editor-title"><span>✦</span> ProgressCard Studio</h1>
        <p class="editor-subtitle">Design and export beautiful progress cards</p>
      </div>
      <button class="btn-templates" onclick="openTemplateModal()">📋 Templates</button>
    </div>
    
    <!-- Tab Navigation -->
    <div class="tabs-nav">
      <button class="tab-btn active" onclick="switchTab('tab-profile')">Profile</button>
      <button class="tab-btn" onclick="switchTab('tab-stats')">Stats</button>
      <button class="tab-btn" onclick="switchTab('tab-progress')">Lists</button>
      <button class="tab-btn" onclick="switchTab('tab-chips')">Content</button>
      <button class="tab-btn" onclick="switchTab('tab-theme')">Theme</button>
    </div>
    
    <!-- Tab Contents -->
    <div class="tabs-content">
      
      <!-- ── Tab 1: Profile & Header ── -->
      <div id="tab-profile" class="tab-pane active">
        <div class="form-group row-flex">
          <div>
            <label for="input-fname">Full Name</label>
            <input type="text" id="input-fname" oninput="updateProfileField('name', this.value)" />
          </div>
          <div>
            <label for="input-avatar">Avatar Initials</label>
            <input type="text" id="input-avatar" maxlength="3" oninput="updateProfileField('avatar', this.value)" />
          </div>
        </div>
        
        <div class="form-group">
          <label for="input-fhandle">GitHub Handle</label>
          <input type="text" id="input-fhandle" placeholder="github.com/username" oninput="updateProfileField('handle', this.value)" />
        </div>

        <div class="form-group row-flex">
          <div>
            <label for="input-linkedin">LinkedIn</label>
            <input type="text" id="input-linkedin" placeholder="linkedin.com/in/..." oninput="updateSocialField('linkedin', this.value)" />
          </div>
          <div>
            <label for="input-email">Email</label>
            <input type="text" id="input-email" placeholder="you@email.com" oninput="updateSocialField('email', this.value)" />
          </div>
        </div>

        <div class="form-group row-flex">
          <div>
            <label for="input-twitter">Twitter / X</label>
            <input type="text" id="input-twitter" placeholder="@handle" oninput="updateSocialField('twitter', this.value)" />
          </div>
          <div>
            <label for="input-website">Website</label>
            <input type="text" id="input-website" placeholder="yoursite.com" oninput="updateSocialField('website', this.value)" />
          </div>
        </div>
        
        <div class="section-divider"></div>

        <div class="form-group row-flex">
          <div>
            <label for="input-weekpill">Card Label</label>
            <input type="text" id="input-weekpill" oninput="updateHeaderField('weekText', this.value)" />
          </div>
          <div>
            <label for="input-date">Date Range</label>
            <input type="text" id="input-date" oninput="updateHeaderField('dateText', this.value)" />
          </div>
        </div>
        
        <div class="form-group">
          <label for="input-title">Card Title</label>
          <input type="text" id="input-title" oninput="updateHeaderField('title', this.value)" />
        </div>
        
        <div class="form-group">
          <label for="input-subtitle">Subtitle (HTML &lt;b&gt; for bold)</label>
          <textarea id="input-subtitle" oninput="updateHeaderField('subtitle', this.value)"></textarea>
        </div>

        <div class="form-group">
          <label>Footer Badges</label>
          <div id="badges-editor-container"></div>
        </div>
      </div>
      
      <!-- ── Tab 2: Stats ── -->
      <div id="tab-stats" class="tab-pane">
        <div id="stats-editor-container"></div>
        <button class="btn-add" onclick="addStat()">
          <span>➕</span> Add Stat Box
        </button>
      </div>
      
      <!-- ── Tab 3: Progress Lists ── -->
      <div id="tab-progress" class="tab-pane">
        <div id="panels-editor-container"></div>
        <button class="btn-add" onclick="addPanel()" style="margin-top:14px;">
          <span>➕</span> Add Panel
        </button>
      </div>
      
      <!-- ── Tab 4: Content (Chips & Quote) ── -->
      <div id="tab-chips" class="tab-pane">
        <div class="form-group">
          <label for="input-chips-label">Section Label</label>
          <input type="text" id="input-chips-label" oninput="updateChipsLabel(this.value)" />
        </div>
        
        <div class="form-group">
          <label>Items</label>
          <div id="chips-editor-container"></div>
          <button class="btn-add" onclick="addChip()">
            <span>➕</span> Add Chip
          </button>
        </div>

        <div class="section-divider"></div>
        
        <div class="form-group">
          <label for="input-quote">Quote (HTML &lt;b&gt; for bold)</label>
          <textarea id="input-quote" oninput="updateQuote(this.value)"></textarea>
        </div>
      </div>

      <!-- ── Tab 5: Theme ── -->
      <div id="tab-theme" class="tab-pane">
        <div class="form-group">
          <label>Quick Themes</label>
          <div class="theme-presets-grid" id="theme-presets-grid"></div>
        </div>
        
        <div class="section-divider"></div>
        
        <label style="margin-bottom:12px;">Custom Colors</label>
        <div id="theme-colors-editor"></div>
      </div>
      
    </div>
    
    <!-- Sidebar Footer -->
    <div class="editor-footer">
      <button class="btn-primary" onclick="copyCardImage()">
        <span>📋</span> Copy Card to Clipboard
      </button>
      <div class="btn-group">
        <button class="btn-secondary" id="btn-download" onclick="exportCardImage()">
          <span>🖼️</span> Download PNG
        </button>
        <button class="btn-secondary" onclick="exportCleanHTML()">
          <span>📄</span> Export HTML
        </button>
      <div style="display:flex; gap:8px;">
        <input type="file" id="upload-file" accept=".html,.png" style="display:none;" onchange="handleFileUpload(event)">
        <button class="btn-secondary" onclick="document.getElementById('upload-file').click()" style="flex:1">
          <span>📂</span> Load Card
        </button>
        <button class="btn-secondary btn-reset" onclick="resetToDefaults()" style="flex:1; margin-top:0;">
          <span>🔄</span> Reset
        </button>
      </div>
    </div>
  </div>
  
  <!-- ══════════ PREVIEW PANEL ══════════ -->
  <div class="preview-panel">
    <div class="preview-header">
      <div class="preview-label">Live Preview</div>
      <div style="font-size:11px; color:var(--t2);">Real-time rendering</div>
    </div>
    
    <div class="capture-area-container">
      <div id="capture-wrap" class="card-capture-area">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div id="preview-card" class="card"></div>
      </div>
    </div>
  </div>

</div>

<!-- Template Modal -->
<div id="template-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeTemplateModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📋 Choose a Template</h2>
      <button class="modal-close" onclick="closeTemplateModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--ed-text-muted);margin-bottom:16px;">Pick a starting point. Your profile info stays the same — only the card content changes.</p>
      <div class="template-grid" id="template-grid"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
